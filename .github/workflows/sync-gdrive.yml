name: Sync GitHub and Google Drive

on:
  push:
    branches: [main]

jobs:
  rclone-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        env:
          RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_B64" | tr -d '\n' | base64 -d > ~/.config/rclone/rclone.conf

      - name: Sync repository to Google Drive
        run: |
          rclone sync . google_drive:uc-shop-ru_new \
            --filter-from .rclone-filter.txt \
            --exclude ".git/**" \
            --fast-list \
            --transfers 8