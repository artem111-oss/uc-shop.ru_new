name: Sync GitHub and Google Drive

on:
  push:
    branches: [main]

jobs:
  rclone-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Sync raw repository to Google Drive
        run: |
          rclone sync . google_drive:uc-shop-ru_new \
            --filter-from .rclone-filter.txt \
            --exclude ".git/**" \
            --fast-list \
            --transfers 4 \
            --retries 3 \
            --low-level-retries 10

      - name: Convert code files to markdown for Drive
        run: |
          mkdir -p drive_export
          find . -type f \( -name "*.php" -o -name "*.vue" -o -name "*.ts" -o -name "*.scss" -o -name "*.blade.php" \) \
            ! -path "*/vendor/*" ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/drive_export/*" -size -30M | while read -r f; do
            safe_name=$(echo "$f" | sed 's/^\.\///' | tr '/' '_' | sed 's/\.php/_php/g; s/\.vue/_vue/g; s/\.ts/_ts/g; s/\.scss/_scss/g')
            {
              echo "FILE PATH: $f"
              echo ""
              echo '```'
              cat "$f"
              echo '```'
            } > "drive_export/${safe_name}.md"
          done
          echo "Total converted files:"
          find drive_export -type f | wc -l

      - name: Sync exported code to Google Drive
        run: |
          rclone sync drive_export google_drive:uc-shop-ru_new/code_export \
            --fast-list \
            --transfers 4 \
            --retries 3 \
            --low-level-retries 10