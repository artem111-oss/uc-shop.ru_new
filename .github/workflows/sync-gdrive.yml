name: Sync GitHub and Google Drive

on:
  push:
    branches: [main]

jobs:
  rclone-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Sync raw repository to Google Drive
        run: |
          rclone sync . google_drive:uc-shop-ru_new \
            --filter-from .rclone-filter.txt \
            --exclude ".git/**" \
            --fast-list \
            --transfers 4 \
            --retries 3 \
            --low-level-retries 10

      - name: Convert code files to grouped markdown
        run: |
          mkdir -p drive_export
          for dir in app/Http/Controllers app/Http/Controllers/Api app/Services app/Models app/Http/Middleware app/Http/Requests routes resources/views resources/js; do
            safe_name=$(echo "$dir" | tr '/' '_')
            out="drive_export/${safe_name}_bundle.md"
            > "$out"
            find "$dir" -maxdepth 1 -type f \( -name "*.php" -o -name "*.vue" -o -name "*.blade.php" \) 2>/dev/null | while read -r f; do
              echo "## FILE: $f" >> "$out"
              echo '```' >> "$out"
              cat "$f" >> "$out"
              echo '```' >> "$out"
              echo "" >> "$out"
            done
          done
      - name: Sync bundled code to Google Drive
        run: |
          rclone sync drive_export google_drive:uc-shop-ru_new/code_bundles \
            --fast-list --transfers 4 --retries 3 --low-level-retries 10

      - name: Sync exported code to Google Drive
        run: |
          rclone sync drive_export google_drive:uc-shop-ru_new/code_export \
            --fast-list \
            --transfers 4 \
            --retries 3 \
            --low-level-retries 10