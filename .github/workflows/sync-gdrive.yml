name: Sync GitHub and Google Drive

on:
  push:
    branches: [main]

jobs:
  rclone-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Sync repository to Google Drive
        run: |
          rclone sync . google_drive:uc-shop-ru_new \
            --filter-from .rclone-filter.txt \
            --exclude ".git/**" \
            --transfers 2 \
            --checkers 4 \
            --tpslimit 4 \
            --drive-pacer-min-sleep 100ms \
            --retries 5 \
            --low-level-retries 10 \
            -v